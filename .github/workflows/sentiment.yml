name: Run Sentiment Bot

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - run: npm start

      - name: Publish latest result to docs/
        run: cp output/latest.json docs/latest.json

      - name: Commit updated result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest.json
          git diff --staged --quiet || git commit -m "Update sentiment data [skip ci]"
          git push
